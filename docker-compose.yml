services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: alpha-venear-unlock:local
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
    ports:
      - "3000:3000"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/healthz').then(async (res) => { if (!res.ok) throw new Error(String(res.status)); const body = (await res.text()).trim(); if (body !== 'ok') throw new Error(body); }).catch(() => process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
